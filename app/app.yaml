command:
  - uvicorn
  - main:app
  - --host
  - 0.0.0.0
  - --port
  - 8000

env:
  - name: DATABRICKS_WAREHOUSE_ID
    value: "3f5fda9e5ef763b6"
  - name: VS_ENDPOINT_NAME
    value: "commodities_vs_endpoint"
  - name: VS_INDEX_NAME
    value: "commodities_research_catalog.news_research.news_articles_index"
  - name: CATALOG
    value: "commodities_research_catalog"
  - name: SCHEMA
    value: "news_research"
  - name: LLM_ENDPOINT
    value: "databricks-claude-sonnet-4"

resources:
  - name: sql-warehouse
    sql_warehouse:
      permission: CAN_USE
  - name: serving-endpoint
    serving_endpoint:
      name: databricks-claude-sonnet-4
      permission: CAN_QUERY
  - name: serving-endpoint-embeddings
    serving_endpoint:
      name: databricks-gte-large-en
      permission: CAN_QUERY
  - name: vector-search-endpoint
    vector_search_endpoint:
      name: commodities_vs_endpoint
      permission: CAN_USE
